<div class="groups">
  <p-toast></p-toast>
  <p-confirmDialog></p-confirmDialog>

  <!-- MODAL NEW GROUP -->
  <p-dialog [header]="editingGroupId ? 'Edit Group' : 'New Group'" [(visible)]="visible" [style]="{ width: '30rem' }" [modal]="true">
    <div class="field">
      <label for="groupName">Group Name</label>
      <input pInputText id="groupName" [(ngModel)]="newGroupName"
             placeholder="e.g. Marketing" class="w-full" />
    </div>
    <div class="field">
      <label for="groupDesc">Description</label>
      <input pInputText id="groupDesc" [(ngModel)]="newGroupDescription"
             placeholder="Brief description" class="w-full" />
    </div>

    <ng-template pTemplate="footer">
      <p-button label="Cancel" severity="secondary" (onClick)="visible = false" />
      <p-button [label]="editingGroupId ? 'Update' : 'Save Group'" icon="pi pi-check" (onClick)="saveGroup()" />
    </ng-template>
  </p-dialog>

  <h2 class="page-title">Groups Management</h2>

  <!-- TOTAL N CARDS -->
  <div class="stats-grid">
    @for (stat of stats; track stat.label) {
      <div class="stat-card">
        <div class="stat-icon" [style.background]="stat.color + '18'" [style.color]="stat.color">
          <i [class]="stat.icon"></i>
        </div>
        <div class="stat-info">
          <span class="stat-label">{{ stat.label }}</span>
          <span class="stat-value">{{ stat.value }}</span>
        </div>
      </div>
    }
  </div>

  <!-- GROUPS GRID -->
  <div class="groups-wrapper">
    <div class="tab-header">
      <span class="tab-subtitle">All user groups</span>
      <p-button *appHasPermission="'group:add'" label="New Group" icon="pi pi-plus" severity="secondary" (onClick)="newGroup()" />
    </div>
    <div class="groups-grid">
      @for (group of groups; track group.id) {
        <div class="group-card">
          <div class="group-icon" [style.background]="group.color + '18'" [style.color]="group.color">
            <i [class]="group.icon || 'pi pi-sitemap'"></i>
          </div>
          <div class="group-info">
            <h4 class="group-name">{{ group.name }}</h4>
            <p class="group-desc">{{ group.description }}</p>
            <span class="group-members" [style.color]="group.color">
              <i class="pi pi-users"></i> {{ group.members }} members
            </span>
          </div>
          <div class="group-actions" style="display: flex; gap: 0.5rem; justify-content: flex-end; width: 100%;">
            <p-button label="View Dashboard" [outlined]="true" size="small" (onClick)="goToDashboard(group.id)" styleClass="mr-auto"></p-button>
            <div>
              <p-button *appHasPermission="'group:edit'" icon="pi pi-pencil" [text]="true" severity="info" size="small" (onClick)="editGroup(group)"></p-button>
              <p-button *appHasPermission="'group:delete'" icon="pi pi-trash" [text]="true" severity="danger" size="small" (onClick)="confirmDeleteGroup(group)"></p-button>
            </div>
          </div>
        </div>
      }
    </div>
  </div>
</div>
